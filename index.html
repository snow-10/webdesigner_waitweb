<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>東勢林場訂房等待中</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand" href="/">
                <img alt="東勢林場" width="180" height="60" src="https://universal.codes/f505fc38d383419ff80aacdb84397ac8.png">
            </a>
            <ul class="navbar-nav">
                <li class="nav-item1">系統人數過載，感謝您的耐心等候。</li>
                <!-- <li class="nav-item2">常見問答</li> -->
            </ul>
        </div>
    </nav>

    <main class="loading-container">
        <div class="waiting-text">請不要關閉或刷新瀏覽器，系統正在依順序進入訂房畫面</div>
        <div class="fireflies">
            <div class="firefly"></div>
            <div class="firefly"></div>
            <div class="firefly"></div>
            <div class="firefly"></div>
            <div class="firefly"></div>
        </div>
        <div class="loading-text">Loading...</div>

        <div class="map">
            <a class="navbar-brand" href="/">
                <img alt="東勢林場地圖" width="850" height="600" src="http://www.tsfa.com.tw/upload/web/2025web/%e5%9c%92%e5%8d%80%e5%b0%8e%e8%a6%bd%e5%9c%961131209.jpg">
            </a>
        </div>

        <div class="faq-container">
            <div class="faq-title">常見問答</div>
            
            <div class="faq-item">
                <div class="faq-question">&gt; 我有訂購到房間嗎？</div>
                <div class="faq-answer">&gt; 可前往您填寫的email查看，若訂購成功，系統會發送訂購資訊，也可至訂單查詢中查詢。</div>
            </div>
            
            <div class="faq-item">
                <div class="faq-question">&gt; 我有付款完成嗎？</div>
                <div class="faq-answer">&gt; 請別擔心，您同樣可至訂單查詢中找到您的付款狀態；如未成功，系統將會為您保留3小時，於時間內付款完成，訂單皆成立。</div>
            </div>
        </div>

    </main>

</body>
</html>
